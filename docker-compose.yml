services:
  web:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3010:3000"
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - ADAFRUIT_IO_USERNAME=${ADAFRUIT_IO_USERNAME}
      - ADAFRUIT_IO_KEY=${ADAFRUIT_IO_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ./data:/app/data

  redis:
    image: redis:alpine
    ports:
      - "6381:6379"
    restart: always

volumes:
  data:
