services:
  web:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3010:3000"
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - ADAFRUIT_IO_USERNAME=${ADAFRUIT_IO_USERNAME}
      - ADAFRUIT_IO_KEY=${ADAFRUIT_IO_KEY}
      - REDIS_URL=redis://redis:6379
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-IoT Archive <noreply@resend.dev>}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3010}
    depends_on:
      - redis
    volumes:
      - ./data:/app/data

  redis:
    image: redis:alpine
    ports:
      - "6381:6379"
    restart: always

volumes:
  data:
